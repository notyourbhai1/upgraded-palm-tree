name: Unzip Archive

on:
  workflow_dispatch:
    inputs:
      zip_path:
        description: 'Path to a specific zip file (leave blank to auto-detect)'
        required: false
        default: ''
      extract_to:
        description: 'Destination folder for extracted contents'
        required: true
        default: '.'
  push:
    paths:
      - '**.zip'

permissions:
  contents: write

jobs:
  unzip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine zip target
        id: target
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            INPUT_PATH="${{ inputs.zip_path }}"
            if [ -n "$INPUT_PATH" ]; then
              ZIP_PATH="$INPUT_PATH"
            else
              ZIP_PATH=$(find . -name '*.zip' -not -path './.git/*' | head -n 1)
            fi
            echo "extract_to=${{ inputs.extract_to }}" >> "$GITHUB_OUTPUT"
          else
            ZIP_PATH=$(git diff --name-only HEAD^ HEAD | grep '\.zip$' | head -n 1)
            echo "extract_to=." >> "$GITHUB_OUTPUT"
          fi

          if [ -z "$ZIP_PATH" ]; then
            echo "No zip file found" >&2
            exit 1
          fi

          echo "zip_path=$ZIP_PATH" >> "$GITHUB_OUTPUT"

      - name: Unzip archive
        run: |
          mkdir -p "${{ steps.target.outputs.extract_to }}"
          unzip -o "${{ steps.target.outputs.zip_path }}" -d "${{ steps.target.outputs.extract_to }}"

      - name: Commit extracted files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Extract $(basename ${{ steps.target.outputs.zip_path }})"
          git push
